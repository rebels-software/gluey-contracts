name: Build, test and publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    uses: rebels-software/github-actions/.github/workflows/build-and-test.yaml@v1.0.0
    with:
      csproj-path: src/Gluey.Contract/Gluey.Contract.csproj
    secrets:
      CODE_COV_TOKEN: ${{ secrets.CODE_COV_TOKEN }}

  create-tag:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [build-and-test]
    uses: rebels-software/github-actions/.github/workflows/create-version-tag.yaml@v1.0.0
    with:
      csproj-path: src/Gluey.Contract/Gluey.Contract.csproj

  publish-contract:
    needs: [build-and-test, create-tag]
    if: always() && needs.build-and-test.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || needs.create-tag.result == 'success')
    uses: rebels-software/github-actions/.github/workflows/publish-nuget.yaml@v1.0.0
    with:
      csproj-path: src/Gluey.Contract/Gluey.Contract.csproj
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-contract-json:
    needs: [build-and-test, create-tag]
    if: always() && needs.build-and-test.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || needs.create-tag.result == 'success')
    uses: rebels-software/github-actions/.github/workflows/publish-nuget.yaml@v1.0.0
    with:
      csproj-path: src/Gluey.Contract.Json/Gluey.Contract.Json.csproj
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
